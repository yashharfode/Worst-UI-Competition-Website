<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirasha University - Worst Website</title>
    <script>
        // Suppress purely development warnings from Tailwind CDN and Babel standalone 
        // to give a clean console for the user.
        const originalWarn = console.warn;
        console.warn = (...args) => {
            if (typeof args[0] === 'string') {
                if (args[0].includes('cdn.tailwindcss.com') || args[0].includes('in-browser Babel')) return;
            }
            originalWarn(...args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@latest?deps=react@18.2.0"
      }
    }
  </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }
    </style>
</head>

<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            AlertTriangle, ShieldAlert, Ghost, Loader2, MousePointer2, Briefcase,
            BookOpen, GraduationCap, Home, PhoneCall, Terminal, Bug, BookX,
            Building, Skull, MessageSquareWarning, X, Phone, PhoneOff, UserX,
            Star, Menu, User, Mail, Zap, FileWarning, ShoppingCart, Bomb,
            MapPin, Navigation
        } from 'lucide-react';

        // --- API & UTILS ---
        const apiKey = ""; // Canvas will inject API Key here

        const lerp = (start, end, factor) => start + (end - start) * factor;

        const romanize = (num) => {
            if (isNaN(num)) return NaN;
            let digits = String(+num).split(""),
                key = ["", "C", "CC", "CCC", "CD", "D", "DC", "DCC", "DCCC", "CM", "", "X", "XX", "XXX", "XL", "L", "LX", "LXX", "LXXX", "XC", "", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX"],
                roman = "", i = 3;
            while (i--) roman = (key[+digits.pop() + (i * 10)] || "") + roman;
            return Array(+digits.join("") + 1).join("M") + roman;
        };

        // --- GEMINI CHATBOT ---
        const offlineRoasts = [
            "Aapki coding dekh kar lagta hai aapne HTML ko programming language maan liya hai.",
            "Dimaag ka istemaal karein, sirf keyboard pitne se error solve nahi hote.",
            "Aapki shikayaton ka folder humne Recycle Bin mein daal diya hai.",
            "Aapke baare mein soch kar AI ko bhi depression aa raha hai.",
            "Aisa UI design kiya hai ki andha bhi dekh ke rone lagega."
        ];

        const fetchGeminiRoast = async (userText) => {
            if (!apiKey) return offlineRoasts[Math.floor(Math.random() * offlineRoasts.length)];
            const prompt = `Tu ek bohot hi sarcastic, funny aur tez dimaag wala AI bot hai "Nirasha University" ka. User ne bola: "${userText}". Usko Hinglish me brutally roast kar (1-2 lines me). Uski complains ya shakal ka mazak uda. WARNING: Koi gande words use mat karna. Sirf taane (sarcasm) use kar. Help bilkul mat karna.`;
            const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 80 } };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("API Failed");
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || offlineRoasts[Math.floor(Math.random() * offlineRoasts.length)];
            } catch (err) {
                return offlineRoasts[Math.floor(Math.random() * offlineRoasts.length)];
            }
        };

        export default function App() {
            const [appState, setAppState] = useState('INTRO');

            const [realMousePos, setRealMousePos] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
            const [fakeCursorPos, setFakeCursorPos] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
            const [mirrorCursorPos, setMirrorCursorPos] = useState({ x: 0, y: 0 });
            const [attachedGhosts, setAttachedGhosts] = useState([]);
            const [ghostStatus, setGhostStatus] = useState('idle');
            const [incomingCall, setIncomingCall] = useState(false);
            const [apocalypse, setApocalypse] = useState(false);

            const rusticateBtnRef = useRef(null);
            const audioCtxRef = useRef(null);
            const ringtoneIntervalRef = useRef(null);
            const apocalypseAudioRef = useRef(null);

            // --- AUDIO ENGINE ---
            const initAudio = () => {
                if (!audioCtxRef.current) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxRef.current = ctx;

                    const drone = ctx.createOscillator();
                    const droneGain = ctx.createGain();
                    drone.type = 'sine';
                    drone.frequency.setValueAtTime(45, ctx.currentTime);
                    droneGain.gain.setValueAtTime(0.04, ctx.currentTime);
                    drone.connect(droneGain); droneGain.connect(ctx.destination);
                    drone.start();

                    setInterval(() => {
                        if (ctx.state === 'suspended' || ghostStatus === 'hacking' || apocalypse) return;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = Math.random() > 0.5 ? 'triangle' : 'sawtooth';
                        osc.frequency.setValueAtTime(Math.random() * 800 + 100, ctx.currentTime);
                        gain.gain.setValueAtTime(0.015, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.4);
                    }, 700);

                    window.addEventListener('click', () => {
                        if (ctx.state === 'suspended') ctx.resume();
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(Math.random() * 600 + 200, ctx.currentTime);
                        gain.gain.setValueAtTime(0.02, ctx.currentTime);
                        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.1);
                    });
                } else if (audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
            };

            const playApocalypseAudio = () => {
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();

                const bufferSize = ctx.sampleRate * 10;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                const noise = ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(100, ctx.currentTime);
                filter.frequency.linearRampToValueAtTime(3000, ctx.currentTime + 5);
                filter.frequency.linearRampToValueAtTime(100, ctx.currentTime + 10);

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(1, ctx.currentTime + 5);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 10);

                noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
                noise.start();
                apocalypseAudioRef.current = noise;
            };

            const triggerApocalypse = () => {
                setApocalypse(true);
                playApocalypseAudio();
                setTimeout(() => {
                    setApocalypse(false);
                }, 10000);
            };

            const playGrannyScream = () => {
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(50, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(2000, ctx.currentTime + 0.1);
                osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 2);
                gain.gain.setValueAtTime(0.8, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 2);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 2);
            };

            const startRingtone = useCallback(() => {
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();

                if (ringtoneIntervalRef.current) clearInterval(ringtoneIntervalRef.current);

                ringtoneIntervalRef.current = setInterval(() => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); // Loud
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                }, 500);
            }, []);

            const stopRingtone = useCallback(() => {
                if (ringtoneIntervalRef.current) clearInterval(ringtoneIntervalRef.current);
            }, []);

            // --- MOUSE TRACKING & AUTO-HACK ---
            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (ghostStatus !== 'hacking') setRealMousePos({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, [ghostStatus]);

            useEffect(() => {
                let animationFrameId;
                const updateCursor = () => {
                    if (ghostStatus === 'hacking' && rusticateBtnRef.current) {
                        // GHOST AUTO-CONTROL
                        const rect = rusticateBtnRef.current.getBoundingClientRect();
                        const targetX = rect.left + rect.width / 2;
                        const targetY = rect.top + rect.height / 2;

                        setFakeCursorPos(prev => {
                            const dx = targetX - prev.x;
                            const dy = targetY - prev.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);

                            if (dist < 15) {
                                setAppState('RUSTICATED');
                                setGhostStatus('idle');
                                setAttachedGhosts([]);
                                return prev;
                            }
                            return { x: prev.x + (dx / dist) * 4, y: prev.y + (dy / dist) * 4 };
                        });
                    } else {
                        setFakeCursorPos(prev => ({ x: lerp(prev.x, realMousePos.x, 0.15), y: lerp(prev.y, realMousePos.y, 0.15) }));
                        setMirrorCursorPos(prev => ({ x: lerp(prev.x, window.innerWidth - realMousePos.x, 0.05), y: lerp(prev.y, window.innerHeight - realMousePos.y, 0.05) }));
                    }
                    animationFrameId = requestAnimationFrame(updateCursor);
                };
                updateCursor();
                return () => cancelAnimationFrame(animationFrameId);
            }, [realMousePos, ghostStatus]);

            const initiateGhostHack = () => {
                setGhostStatus('haunting');
                setTimeout(() => {
                    playGrannyScream();
                    setGhostStatus('hacking');
                }, 8000);
            };

            const handleRestart = () => {
                setAppState('INTRO');
                setAttachedGhosts([]);
                setGhostStatus('idle');
                setIncomingCall(false);
                stopRingtone();
            };

            // --- ROUTING ---
            if (appState === 'INTRO') {
                return (
                    <div className="h-screen w-screen bg-black text-white flex flex-col items-center justify-center font-mono overflow-hidden">
                        <style>{`
          * { cursor: none !important; user-select: none; }
          ::-webkit-scrollbar { width: 50px; background: #000; }
          ::-webkit-scrollbar-thumb { background: #ff007f; border: 5px dashed yellow; border-radius: 20px; }
          .zalgo:hover { font-family: 'Wingdings', fantasy; letter-spacing: -2px; color: red; }
          .shake-constantly { animation: shake 0.5s infinite; }
          @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 25% { transform: translate(-1px, -2px) rotate(-1deg); } 50% { transform: translate(-3px, 0px) rotate(1deg); } 75% { transform: translate(3px, 2px) rotate(0deg); } 100% { transform: translate(1px, -1px) rotate(1deg); } }
          
          /* Floating Bubbles Animation */
          @keyframes floatUp { to { transform: translateY(-150vh) scale(2); opacity: 0; } }
        `}</style>
                        <LaggyCursor pos={fakeCursorPos} mirrorPos={mirrorCursorPos} ghosts={attachedGhosts} />

                        <Terminal size={100} className="text-red-600 animate-bounce mb-6" />
                        <h1 className="text-5xl md:text-7xl font-black mb-8 text-center text-red-600 uppercase border-b-8 border-red-600 pb-4 shadow-[0_10px_0_red] shake-constantly">
                            Nirasha Vishwavidyalaya
                        </h1>
                        <p className="max-w-2xl text-center mb-12 text-yellow-300 text-xl font-bold bg-gray-900 p-4 border-2 border-yellow-300 transform -rotate-2">
                            CHETAVANI: Volume full rakhein. Yeh UI aapka dimaag kharab kar degi.
                        </p>
                        <button
                            onClick={() => { initAudio(); setAppState('LOGIN'); }}
                            className="px-10 py-6 bg-red-900 border-[8px] border-double border-white text-white font-black hover:bg-white hover:text-red-900 transition-all text-3xl z-10 uppercase tracking-widest shadow-[0_0_50px_red]"
                        >
                            ENTER THE NIGHTMARE
                        </button>
                    </div>
                );
            }

            if (appState === 'LOGIN') {
                return <LoginScreen onLoginSuccess={() => { window.scrollTo(0, 0); setAppState('MAIN_SITE'); }} />;
            }

            if (appState === 'RUSTICATED') {
                return (
                    <div className="h-screen w-screen bg-red-950 flex flex-col items-center justify-center text-white overflow-hidden text-center p-4">
                        <LaggyCursor pos={fakeCursorPos} mirrorPos={null} ghosts={[]} />
                        <Skull size={250} className="animate-pulse mb-8 text-black" style={{ filter: 'drop-shadow(0 0 100px red)' }} />
                        <h1 className="text-6xl md:text-[120px] font-black text-white bg-black p-6 uppercase border-[16px] border-red-600 shadow-[0_0_150px_red] shake-constantly">
                            YOU ARE RUSTICATED
                        </h1>
                        <p className="mt-12 text-4xl font-mono text-yellow-300 bg-black p-4 border-8 border-yellow-300">
                            The Ghost hijacked your mouse and destroyed your career.
                        </p>
                        <button onClick={handleRestart} className="mt-16 bg-black text-red-500 font-black text-4xl p-8 border-8 border-red-500 hover:bg-white hover:text-black hover:scale-125 transition-transform">
                            RESTART TORTURE
                        </button>
                    </div>
                );
            }

            if (appState === 'MAIN_SITE') {
                return (
                    <>
                        {/* DO NOT CLICK Apocalypse Layer Wrapper */}
                        <div
                            className="origin-center min-h-screen w-full bg-gray-300"
                            style={{
                                transform: apocalypse ? 'scale(0.15) rotate(15deg)' : 'scale(1) rotate(0deg)',
                                transition: 'transform 10s cubic-bezier(0.5, 0, 0.5, 1), filter 2s ease-in',
                                filter: apocalypse ? 'invert(1) hue-rotate(180deg) brightness(0.6)' : (ghostStatus !== 'idle' ? 'sepia(1) hue-rotate(-50deg) brightness(0.5)' : 'none'),
                                pointerEvents: apocalypse ? 'none' : 'auto'
                            }}
                        >
                            <MainWebsite
                                fakeCursorPos={fakeCursorPos}
                                mirrorCursorPos={mirrorCursorPos}
                                mousePos={realMousePos}
                                attachedGhosts={attachedGhosts}
                                setAttachedGhosts={setAttachedGhosts}
                                setIncomingCall={setIncomingCall}
                                initiateGhostHack={initiateGhostHack}
                                ghostStatus={ghostStatus}
                                rusticateBtnRef={rusticateBtnRef}
                                triggerApocalypse={triggerApocalypse}
                            />
                        </div>

                        {/* Apocalypse Zoom-Out Giant Message Overlay */}
                        {apocalypse && (
                            <div className="fixed inset-0 z-[9999999] pointer-events-none overflow-hidden flex items-center justify-center">
                                <div className="absolute inset-0 bg-black/60"></div>

                                {/* Floating Chaos Bubbles */}
                                {[...Array(60)].map((_, i) => (
                                    <div key={i} className="absolute bottom-[-100px] bg-black shadow-[0_0_30px_#000] rounded-full animate-[floatUp_4s_linear_forwards]" style={{
                                        left: `${Math.random() * 100}%`,
                                        width: `${Math.random() * 150 + 30}px`,
                                        height: `${Math.random() * 150 + 30}px`,
                                        animationDelay: `${Math.random() * 3}s`,
                                        animationDuration: `${Math.random() * 4 + 2}s`
                                    }}></div>
                                ))}

                                <h1 className="text-[12vw] font-black text-red-600 mix-blend-screen animate-pulse opacity-90 text-center w-full leading-none z-50 uppercase tracking-widest drop-shadow-[0_0_100px_red]">
                                    SYSTEM DESTROYED<br />YOU FOOL
                                </h1>
                            </div>
                        )}

                        {/* CINEMATIC GHOST HACKING OVERLAY */}
                        {ghostStatus === 'hacking' && (
                            <div className="fixed inset-0 z-[9999999] pointer-events-none flex flex-col items-center justify-center bg-red-900/70 mix-blend-color-burn animate-ping">
                                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-60 mix-blend-overlay animate-[spin_2s_linear_infinite]" />
                                <h1 className="text-[120px] font-black text-red-600 opacity-90 uppercase tracking-[0.2em] shadow-2xl text-center" style={{ textShadow: '0 0 100px black' }}>
                                    I HAVE YOUR<br />CURSOR
                                </h1>
                            </div>
                        )}

                        {/* Incoming Call is rendered globally on top */}
                        {incomingCall && <PhoneCallScreen onClose={() => setIncomingCall(false)} startRingtone={startRingtone} stopRingtone={stopRingtone} />}

                        <LaggyCursor pos={fakeCursorPos} mirrorPos={mirrorCursorPos} ghosts={attachedGhosts} />
                    </>
                );
            }

            return null;
        }

        // ==========================================
        // GLOBALS & CURSORS
        // ==========================================
        const LaggyCursor = ({ pos, mirrorPos, ghosts }) => (
            <>
                <div className="fixed z-[999999999] pointer-events-none mix-blend-difference" style={{ left: pos.x, top: pos.y, transform: 'translate(-50%, -50%) rotate(25deg)' }}>
                    <MousePointer2 size={60} className="text-green-400 fill-transparent animate-pulse drop-shadow-[0_0_15px_#0f0]" />
                </div>
                {mirrorPos && mirrorPos.x > 0 && (
                    <div className="fixed z-[999999999] pointer-events-none mix-blend-difference opacity-40" style={{ left: mirrorPos.x, top: mirrorPos.y, transform: 'translate(-50%, -50%) rotate(-45deg)' }}>
                        <MousePointer2 size={40} className="text-red-500 fill-transparent drop-shadow-[0_0_15px_#f00]" />
                    </div>
                )}
                {ghosts && ghosts.map((ghost, idx) => (
                    <div
                        key={idx} className="fixed z-[999999998] pointer-events-none text-7xl opacity-90 animate-bounce drop-shadow-[0_0_30px_#f00]"
                        style={{ left: pos.x + (Math.cos(Date.now() / 300 + idx) * 50), top: pos.y + (Math.sin(Date.now() / 300 + idx) * 50), transition: 'all 0.05s linear' }}
                    >
                        {ghost.icon}
                    </div>
                ))}
            </>
        );

        const PhoneCallScreen = ({ onClose, startRingtone, stopRingtone }) => {
            const [callState, setCallState] = useState('ringing');

            useEffect(() => {
                startRingtone();
                return () => stopRingtone();
            }, [startRingtone, stopRingtone]);

            const handleAccept = () => {
                setCallState('connected');
                stopRingtone();
                setTimeout(() => onClose(), 5000);
            };

            const handleDecline = (e) => {
                e.target.style.transform = `translate(${Math.random() * 300 - 150}px, ${Math.random() * 300 - 150}px)`;
            };

            return (
                <div className="fixed inset-0 z-[999999999] bg-black/95 flex flex-col items-center justify-center cursor-none">
                    <div className="bg-gray-900 border-[16px] border-red-900 w-[380px] h-[650px] rounded-[60px] flex flex-col items-center p-8 relative overflow-hidden shadow-[0_0_200px_red] shake-constantly">
                        {callState === 'ringing' ? (
                            <>
                                <div className="w-32 h-32 bg-red-900 rounded-full flex items-center justify-center mb-6 animate-pulse border-8 border-red-500 shadow-inner mt-10">
                                    <UserX size={80} className="text-white animate-spin" />
                                </div>
                                <h2 className="text-5xl text-white font-black mb-2 text-center uppercase zalgo">Dean Sahab</h2>
                                <p className="text-green-500 font-mono mb-auto animate-ping text-xl font-bold">Incoming Threat...</p>
                                <div className="flex justify-between w-full mt-auto gap-6 z-50 mb-10">
                                    <button onMouseEnter={handleDecline} onClick={() => { }} className="bg-red-600 text-white p-6 rounded-full flex-1 flex justify-center border-4 border-black">
                                        <PhoneOff size={40} />
                                    </button>
                                    <button onClick={handleAccept} className="bg-green-600 text-white p-6 rounded-full flex-1 flex justify-center hover:scale-125 transition-all border-4 border-black animate-bounce">
                                        <Phone size={40} />
                                    </button>
                                </div>
                            </>
                        ) : (
                            <div className="flex flex-col items-center justify-center h-full text-center">
                                <Skull size={150} className="text-red-600 mb-8 animate-ping" />
                                <h2 className="text-4xl font-black text-red-500 uppercase bg-black p-4 border-4 border-red-500">Listen Carefully!</h2>
                                <p className="text-yellow-300 mt-8 font-mono text-2xl font-bold leading-loose">"Agle semester ki fees aaj hi jama kar de varna tujhe library ke bhoot ke paas bhej dunga!"</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // PRE-MAIN SCREENS
        // ==========================================
        const LoginScreen = ({ onLoginSuccess }) => {
            const [pin, setPin] = useState("");
            const [pad, setPad] = useState([1, 2, 3, 4, 5, 6, 7, 8, 9, 0]);

            useEffect(() => {
                const interval = setInterval(() => setPad(prev => [...prev].sort(() => Math.random() - 0.5)), 1200);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="min-h-screen bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-900 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-10 text-center w-full z-20">
                        <h1 className="text-yellow-400 text-2xl font-black bg-black/90 p-4 inline-block border-8 border-dashed border-red-500 uppercase animate-pulse">
                            SYSTEM COMPROMISED. ANY PIN WILL WORK TODAY.
                        </h1>
                    </div>

                    <div className="bg-black/90 border-[12px] border-green-500 p-10 w-full max-w-xl z-10 shadow-[0_0_100px_rgba(0,255,0,0.4)] transform rotate-1">
                        <h2 className="text-5xl text-green-500 font-black text-center mb-8 uppercase tracking-widest border-b-8 border-green-500 pb-6 zalgo">Auth Required</h2>
                        <div className="mb-10 p-8 border-8 border-gray-700 bg-gray-900 relative">
                            <div className="flex justify-between items-end mb-6">
                                <span className="text-6xl text-green-400 font-mono tracking-[0.5em] bg-black px-6 py-6 border-4 border-green-900 w-full text-center shadow-inner">
                                    {pin.padEnd(4, '_')}
                                </span>
                            </div>
                            <div className="grid grid-cols-3 gap-4 mt-8">
                                {pad.map((num, idx) => (
                                    <button key={idx} onClick={() => setPin(prev => (prev.length < 4 ? prev + num : prev))} className="bg-gray-800 text-white font-black text-4xl py-6 hover:bg-green-600 hover:text-black transition-colors border-4 border-gray-600 shadow-md">
                                        {num}
                                    </button>
                                ))}

                            <span className="text-red-600 animate-ping bg-white px-6 py-2 border-8 border-red-600">{messages.length * 13}+</span>
                        </h2>
                        <div className="space-y-8">
                            {messages.map(m => (
                                <div
                                    key={m.id} onClick={() => handleClick(m.id)}
                                    className={`bg-white p-10 border-8 border-black cursor-pointer flex justify-between items-center transition-all duration-700 ${m.exploded ? 'scale-150 opacity-0 translate-y-32 rotate-45 pointer-events-none bg-red-500' : 'hover:bg-yellow-300 hover:-translate-y-2'}`}
                                >
                                    <span className="font-black text-3xl uppercase zalgo">{m.title}</span>
                                    <span className="font-mono font-bold text-xl bg-black text-white px-4 py-2 border-4 border-gray-400">From: {m.sender}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // 4. ADMISSIONS TAB (Chaotic Subject Input + Draining)
        const TabAdmissions = ({ triggerNote }) => {
            const [payHoverCount, setPayHoverCount] = useState(0);
            const [btnOffset, setBtnOffset] = useState({ x: 0, y: 0 });
            const [isDraining, setIsDraining] = useState(false);
            const [balance, setBalance] = useState(100000);
            const [subject, setSubject] = useState("");

            const handleHover = () => {
                if (payHoverCount < 2) {
                    setBtnOffset({ x: Math.random() * 400 - 200, y: Math.random() * -150 - 50 });
                    setPayHoverCount(prev => prev + 1);
                    triggerNote("Too slow! Pay button ran away.");
                } else setBtnOffset({ x: 0, y: 0 });
            };

            const handlePay = (e) => {
                e.preventDefault();
                if (payHoverCount >= 2) {
                    setIsDraining(true);
                    const drain = setInterval(() => {
                        setBalance(prev => {
                            if (prev <= 0) { clearInterval(drain); return 0; }
                            return prev - 1555;
                        });
                    }, 30);
                }
            };

            return (
                <div className="flex flex-col items-center py-10 w-full">
                    <div className="bg-purple-900 p-12 w-full max-w-4xl border-[16px] border-black shadow-[30px_30px_0_#000]">
                        <h2 className="text-6xl font-black text-white text-center mb-12 uppercase bg-black py-6 border-8 border-white">Admission Desk</h2>
                        <form className="space-y-10 flex flex-col items-center w-full">
                            <div className="w-full bg-yellow-200 p-10 border-8 border-black shadow-inner text-black">
                                <label className="font-black text-3xl text-black block mb-6 uppercase">Enter Subject Name:</label>
                                <div className="relative border-8 border-black bg-white min-h-[120px] p-4 flex flex-wrap content-start shadow-inner overflow-hidden">
                                    <input
                                        type="text" value={subject} onChange={e => setSubject(e.target.value)}
                                        className="absolute inset-0 opacity-0 w-full h-full z-10 cursor-none"
                                    />
                                    {subject.split('').map((char, i) => (
                                        <span key={i} style={{
                                            fontSize: `${Math.random() * 50 + 20}px`,
                                            fontWeight: Math.random() > 0.5 ? '900' : '300',
                                            color: `hsl(${Math.random() * 360}, 100%, 30%)`,
                                            transform: `rotate(${Math.random() * 60 - 30}deg) translateY(${Math.random() * 20 - 10}px)`,
                                            fontFamily: Math.random() > 0.5 ? 'monospace' : 'serif'
                                        }} className="inline-block transition-all">{char}</span>
                                    ))}
                                    {subject.length === 0 && <span className="text-gray-400 font-bold text-3xl mt-4 ml-4 uppercase animate-pulse">Type here...</span>}
                                </div>
                            </div>
                            <div className="h-48 relative w-full flex justify-center items-center mt-8">
                                <button
                                    onMouseEnter={handleHover} onClick={handlePay}
                                    className="absolute py-8 px-16 bg-green-500 text-white font-black text-5xl border-[10px] border-black hover:bg-white hover:text-black transition-colors z-10 shadow-[15px_15px_0_#000]"
                                    style={{ transform: `translate(${btnOffset.x}px, ${btnOffset.y}px)` }}
                                >
                                    PAY ₹1,00,000 NOW
                                </button>
                            </div>
                        </form>
                    </div>

                    {isDraining && (
                        <div className="fixed inset-0 z-[9999] bg-red-950 flex flex-col items-center justify-center cursor-none font-mono p-6 text-center">
                            <h2 className="text-6xl md:text-8xl text-white mb-10 font-black animate-ping uppercase">ROBBING YOUR BANK...</h2>
                            <div className="text-9xl md:text-[200px] text-yellow-300 font-black mb-8 bg-black p-10 border-[16px] border-yellow-300 shadow-[0_0_150px_yellow]">₹{balance.toLocaleString()}</div>

                            {balance <= 0 && (
                                <button
                                    onClick={() => { setIsDraining(false); setBalance(100000); setPayHoverCount(0); }}
                                    className="mt-16 bg-white text-black border-[16px] border-black p-12 hover:bg-black hover:text-white transition-colors shadow-[30px_30px_0_#000]"
                                >
                                    <h1 className="text-6xl md:text-7xl font-black mb-6 uppercase">Payment Successful!</h1>
                                    <p className="text-3xl font-bold font-sans">Click here to return to the site and weep silently.</p>
                                </button>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // 5. EXAM TAB 
        const TabExam = ({ triggerNote }) => {
            const [q1, setQ1] = useState(null);
            const [q2, setQ2] = useState(null);
            const [confidence, setConfidence] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (confidence > 0 && confidence < 100) { setConfidence(0); triggerNote("Confidence dropped to 0!"); }
                }, 4000);
                return () => clearInterval(interval);
            }, [confidence, triggerNote]);

            const handleQ1Change = (e) => {
                setQ1(e.target.value);
                const options = ['A', 'B', 'C', 'D'];
                setQ2(options[Math.floor(Math.random() * options.length)]);
                triggerNote("Answering Q1 magically changed Q2!");
            };

            return (
                <div className="flex flex-col items-center w-full max-w-5xl mx-auto py-10">
                    <h2 className="text-6xl font-black mb-12 text-white uppercase bg-indigo-900 px-10 py-6 border-[12px] border-black shadow-[15px_15px_0_#000]">Final Examination</h2>
                    <div className="bg-white w-full p-12 border-[16px] border-black shadow-[30px_30px_0_#000] text-black">

                        <div className="mb-12 p-8 border-8 border-dashed border-red-600 bg-red-50 text-black">
                            <h3 className="font-black text-3xl mb-6">Q1. Solve for X: ∫(e^x * sin(x))dx + HTML = ?</h3>
                            <div className="flex flex-col gap-6 mt-4">
                                {['42', 'undefined', 'SyntaxError', 'Option A is correct'].map(opt => (
                                    <label key={opt} className="flex gap-4 items-center text-2xl font-bold cursor-none bg-white p-4 border-4 border-gray-400">
                                        <input type="radio" name="q1" value={opt} onChange={handleQ1Change} checked={q1 === opt} className="w-8 h-8 cursor-none accent-red-600" /> {opt}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="mb-12 p-8 border-8 border-blue-600 bg-blue-50 text-black">
                            <h3 className="font-black text-3xl mb-6">Q2. Why is the sky blue?</h3>
                            <div className="flex flex-col gap-6 mt-4">
                                {['A', 'B', 'C', 'D'].map(opt => (
                                    <label key={opt} className="flex gap-4 items-center text-2xl font-bold cursor-none bg-white p-4 border-4 border-gray-400 hover:bg-gray-100">
                                        <input type="radio" name="q2" value={opt} onChange={() => triggerNote("You can't change this manually!")} checked={q2 === opt} className="w-8 h-8 cursor-none accent-blue-600" /> Option {opt} (Auto-filled)
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="mb-12 p-8 border-8 border-green-600 bg-green-50 text-black">
                            <h3 className="font-black text-3xl flex justify-between items-center mb-6">
                                <span>Confidence Level:</span><span className="text-green-800 bg-white px-6 py-2 border-4 border-black text-4xl">{confidence}%</span>
                            </h3>
                            <input type="range" min="0" max="100" value={confidence} onChange={e => setConfidence(Number(e.target.value))} className="w-full h-8 bg-gray-300 border-4 border-black cursor-none accent-green-600" />
                        </div>

                        <button
                            className={`w-full font-black py-8 text-4xl border-[12px] border-black transition-colors ${confidence === 100 ? 'bg-black text-white hover:bg-green-600 hover:text-black' : 'bg-gray-300 text-gray-500'}`}
                            onClick={() => {
                                if (confidence === 100) triggerNote("Form Submitted. But server caught fire. You Failed.");
                                else triggerNote("Not confident enough! Fill the slider to 100.");
                            }}
                        >
                            SUBMIT EXAM
                        </button>
                    </div>
                </div>
            );
        };

        // 6. RESULTS TAB 
        const TabResults = ({ triggerNote }) => {
            const [roll, setRoll] = useState("");
            const [rating, setRating] = useState(0);
            const [result, setResult] = useState(null);
            const [showReExam, setShowReExam] = useState(false);

            const handleInput = (e) => {
                let val = e.target.value;
                if (val.length > 0 && Math.random() < 0.25) {
                    const symbols = "!@#$%^&*?";
                    val = val.slice(0, -1) + symbols[Math.floor(Math.random() * symbols.length)];
                    triggerNote("Keyboard malfunction detected.");
                }
                setRoll(val);
            };

            const handleCheck = () => {
                if (!roll || rating === 0) { triggerNote("Fill Roll No and give Rating first!"); return; }
                if (rating >= 4) {
                    setResult({ status: 'FAIL', text: `${rating} Star diya khudko? Overconfident fool. FAIL!` });
                    setTimeout(() => setShowReExam(true), 2000);
                } else {
                    setResult({ status: 'PASS', text: `Rote rote ${rating} star diya. Chal pity-pass kar dia.` });
                }
            };

            return (
                <div className="flex flex-col items-center py-10 w-full">
                    <div className="w-full max-w-3xl bg-gray-200 p-12 border-[16px] border-black shadow-[30px_30px_0_#000] text-center text-black">
                        <h2 className="text-6xl font-black mb-12 text-black bg-yellow-300 border-[12px] border-black py-6 uppercase zalgo">Check Results</h2>

                        <div className="space-y-10">
                            <div>
                                <label className="font-black text-3xl block mb-6 text-left uppercase text-red-600">Roll Number:</label>
                                <input
                                    type="text" value={roll} onChange={handleInput} placeholder="Type here..."
                                    className="w-full p-6 border-[12px] border-black font-mono text-4xl outline-none focus:bg-pink-200 shadow-inner text-black"
                                />
                            </div>

                            <div className="bg-white p-10 border-[12px] border-black shadow-[15px_15px_0_#000]">
                                <label className="font-black text-3xl block mb-8 uppercase text-blue-800">How did the exam go?</label>
                                <div className="flex justify-center gap-6 mb-6">
                                    {[1, 2, 3, 4, 5].map((star) => (
                                        <button key={star} onClick={() => setRating(star)} className="text-7xl focus:outline-none hover:scale-150 transition-transform">
                                            <Star className={star <= rating ? "fill-yellow-400 text-yellow-500 drop-shadow-lg" : "text-gray-300"} size={80} />
                                        </button>
                                    ))}
                                </div>
                                <p className="text-xl text-gray-500 font-bold uppercase">Be honest. We are judging you.</p>
                            </div>

                            {!result ? (
                                <button onClick={handleCheck} className="bg-blue-600 text-white font-black w-full py-8 text-4xl border-[12px] border-black hover:bg-blue-800 uppercase shadow-[15px_15px_0_#000] transition-colors">
                                    SUBMIT & PRAY
                                </button>
                            ) : (
                                <div className={`p-12 border-[16px] mt-10 animate-bounce ${result.status === 'FAIL' ? 'bg-red-600 border-black' : 'bg-green-500 border-black'}`}>
                                    <h1 className="text-[100px] font-black text-white mb-6 shadow-black drop-shadow-xl uppercase">{result.status}</h1>
                                    <p className="font-black text-white text-3xl mt-6 bg-black p-6 uppercase border-8 border-white leading-relaxed">{result.text}</p>
                                </div>
                            )}

                            {showReExam && (
                                <div className="mt-16 p-12 bg-purple-600 border-[16px] border-black animate-spin-slow text-white flex flex-col justify-center shadow-[0_0_100px_purple]">
                                    <h3 className="font-black text-5xl mb-8 uppercase drop-shadow-xl">Apply for Re-Exam!</h3>
                                    <button onClick={() => triggerNote("Bank details compromised.")} className="bg-yellow-400 text-black font-black p-8 border-[12px] border-black text-3xl hover:bg-white transition-colors uppercase">Pay ₹50,000 Penalty</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 7. HOSTEL TAB 
        const hostelGhosts = {
            "Room 101": { name: "Raju B.Tech", icon: "🧟‍♂️", story: "Mera code 10 saal se compile ho raha hai. Mere room mein aaja." },
            "Room 204": { name: "Anjali", icon: "🧛‍♀️", story: "Main backend developer thi. Drop table kiya galti se. Ab tujhe haunt karungi." },
            "Room 404": { name: "Null Pointer", icon: "👻", story: "Main exist nahi karta. Click 'Book' to disappear with me." }
        };

        const TabHostel = ({ initiateGhostHack, triggerNote, setAttachedGhosts }) => {
            const [selectedRoom, setSelectedRoom] = useState("");
            const [showStory, setShowStory] = useState(false);

            const handleSelect = (e) => {
                const val = e.target.value;
                if (hostelGhosts[val]) {
                    setSelectedRoom(val);
                    setShowStory(true);
                }
            };

            const handleBook = () => {
                const ghost = hostelGhosts[selectedRoom];
                setAttachedGhosts(prev => [...prev, ghost]);
                setShowStory(false);
                triggerNote("You made a terrible mistake.");
                if (selectedRoom === "Room 404") initiateGhostHack();
            };

            return (
                <div className="flex flex-col items-center py-10 w-full">
                    <h2 className="text-6xl font-black mb-16 text-white bg-black px-12 py-6 border-[16px] border-red-600 uppercase shadow-[20px_20px_0_red]">Hostel Booking</h2>
                    <div className="w-full max-w-3xl bg-gray-900 p-16 border-[16px] border-gray-700 text-center shadow-[0_0_100px_rgba(0,0,0,0.8)]">
                        <h3 className="text-4xl font-bold mb-10 text-white uppercase border-b-8 border-gray-600 pb-6">Select Your Room:</h3>
                        <select
                            onChange={handleSelect}
                            className="w-full p-8 text-4xl border-[12px] border-red-600 cursor-none mb-10 outline-none bg-black text-red-500 font-bold font-mono text-center appearance-none hover:bg-red-950 transition-colors shadow-inner"
                        >
                            <option value="">-- Choose Your Death --</option>
                            {Object.keys(hostelGhosts).map((room, i) => <option key={i} value={room}>{room} (Haunted)</option>)}
                        </select>
                        <p className="text-2xl font-black text-red-600 animate-pulse bg-black p-6 border-4 border-red-600 uppercase">NOTE: Booking Room 404 initiates the curse. Your mouse will be hacked.</p>
                    </div>

                    {showStory && hostelGhosts[selectedRoom] && (
                        <div className="fixed inset-0 z-[999999] bg-black/95 flex items-center justify-center cursor-none">
                            <div className="bg-red-900 border-[24px] border-black p-12 max-w-2xl text-center shadow-[0_0_250px_red] z-[999999]">
                                <div className="text-[150px] mb-8 animate-bounce drop-shadow-[0_0_50px_#fff]">{hostelGhosts[selectedRoom].icon}</div>
                                <h2 className="text-6xl text-white font-black mb-6 uppercase drop-shadow-xl zalgo">{hostelGhosts[selectedRoom].name}</h2>
                                <p className="text-yellow-300 font-mono text-3xl mb-12 italic bg-black p-8 border-8 border-yellow-300">"{hostelGhosts[selectedRoom].story}"</p>
                                <div className="flex gap-8">
                                    <button onClick={() => setShowStory(false)} className="flex-1 bg-white text-black font-black py-6 text-3xl border-[12px] border-black hover:bg-gray-300 transition-colors shadow-[10px_10px_0_#000]">FLEE</button>
                                    <button onClick={handleBook} className="flex-1 bg-black text-red-500 font-black py-6 text-3xl border-[12px] border-red-500 hover:bg-red-600 hover:text-white transition-colors shadow-[0_0_50px_red]">BOOK ANYWAY</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 8. PLACEMENTS TAB 
        const TabPlacements = ({ triggerNote }) => {
            const [showPuzzle, setShowPuzzle] = useState(false);
            const [acceptPos, setAcceptPos] = useState({ top: '50%', left: '50%' });

            useEffect(() => {
                let interval;
                if (showPuzzle) {
                    interval = setInterval(() => {
                        setAcceptPos({ top: `${Math.random() * 80 + 10}%`, left: `${Math.random() * 80 + 10}%` });
                    }, 700);
                }
                return () => clearInterval(interval);
            }, [showPuzzle]);

            return (
                <div className="flex flex-col items-center py-10 w-full">
                    <h2 className="text-6xl font-black mb-12 text-white bg-blue-800 px-12 py-6 border-[16px] border-black uppercase shadow-[15px_15px_0_#000]">Placements</h2>
                    <div className="bg-white p-16 border-[16px] border-black shadow-[30px_30px_0_#000] w-full max-w-4xl text-center text-black">
                        <h3 className="text-5xl font-black text-blue-600 mb-8 uppercase border-b-[12px] border-blue-600 pb-6">Offer from Google (Fake)</h3>
                        <p className="text-4xl font-bold mb-10 bg-gray-200 p-6 border-8 border-gray-400 text-black">Package: ₹50 Crore / sec</p>
                        <button onClick={() => setShowPuzzle(true)} className="bg-black text-white font-black text-4xl px-10 py-8 w-full border-[12px] border-blue-600 hover:bg-blue-600 transition-colors uppercase shadow-[10px_10px_0_#000]">DOWNLOAD OFFER LETTER</button>
                    </div>

                    {showPuzzle && (
                        <div className="fixed inset-0 z-[999999] bg-yellow-400 p-12 flex flex-col cursor-none border-[32px] border-red-600">
                            <h2 className="text-6xl font-black text-center mb-8 uppercase border-b-[16px] border-black pb-6 text-black bg-white py-4 shadow-xl">To download, catch the ACCEPT button!</h2>
                            <div className="flex-1 relative overflow-hidden bg-black border-[16px] border-white shadow-inner">
                                {[...Array(25)].map((_, i) => (
                                    <button key={i} onClick={() => triggerNote("You Rejected the Offer! Idiot.")} className="absolute bg-red-600 text-white font-black text-2xl p-5 border-4 border-white opacity-80 hover:opacity-100 hover:scale-150 transition-all" style={{ top: `${Math.random() * 85}%`, left: `${Math.random() * 85}%` }}>REJECT</button>
                                ))}
                                <button
                                    onClick={() => { triggerNote("Virus.exe Downloaded successfully!"); setShowPuzzle(false); }}
                                    className="absolute bg-green-500 text-black font-black text-4xl p-8 border-[12px] border-white animate-pulse transition-all duration-300 shadow-[0_0_50px_#0f0]"
                                    style={{ top: acceptPos.top, left: acceptPos.left }}
                                >
                                    ACCEPT OFFER
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 9. CANTEEN TAB 
        const TabCanteen = ({ triggerNote }) => {
            const [cartTotal, setCartTotal] = useState(0);
            const [checkoutStep, setCheckoutStep] = useState(0);
            const [deliveryPos, setDeliveryPos] = useState({ x: 50, y: 50 });

            const addItem = (price, name) => {
                setCartTotal(prev => prev === 0 ? price : prev * 2);
                triggerNote(`${name} added! Price inflated.`);
            };

            useEffect(() => {
                let timer;
                if (checkoutStep === 1) {
                    timer = setInterval(() => {
                        setDeliveryPos(prev => ({ x: prev.x + 5, y: prev.y - 5 }));
                    }, 500);
                }
                return () => clearInterval(timer);
            }, [checkoutStep]);

            return (
                <div className="flex flex-col items-center py-10 w-full">
                    <h2 className="text-6xl font-black mb-12 text-white bg-green-700 px-12 py-6 border-[16px] border-black uppercase shadow-[15px_15px_0_#000]">Canteen Menu</h2>

                    {checkoutStep === 0 && (
                        <div className="w-full max-w-4xl bg-green-100 p-12 border-[16px] border-green-800 shadow-[30px_30px_0_#166534] text-center transform -rotate-1 text-black">
                            <ShoppingCart size={100} className="mx-auto mb-8 text-green-800 animate-bounce" />

                            <div className="space-y-6 mb-10 text-left">
                                <div className="bg-white p-6 border-8 border-black flex justify-between items-center hover:bg-yellow-200 text-black">
                                    <span className="text-3xl font-black">Stale Samosa</span>
                                    <button onClick={() => addItem(40, 'Samosa')} className="bg-green-600 text-white font-bold px-6 py-2 text-xl border-4 border-black">Add (₹40)</button>
                                </div>
                                <div className="bg-white p-6 border-8 border-black flex justify-between items-center hover:bg-yellow-200 text-black">
                                    <span className="text-3xl font-black">Tears Chai</span>
                                    <button onClick={() => addItem(150, 'Chai')} className="bg-green-600 text-white font-bold px-6 py-2 text-xl border-4 border-black">Add (₹150)</button>
                                </div>
                                <div className="bg-white p-6 border-8 border-black flex justify-between items-center hover:bg-yellow-200 text-black">
                                    <span className="text-3xl font-black">Raw Maggi</span>
                                    <button onClick={() => addItem(800, 'Maggi')} className="bg-green-600 text-white font-bold px-6 py-2 text-xl border-4 border-black">Add (₹800)</button>
                                </div>
                            </div>

                            <div className="bg-black p-6 border-8 border-white text-white font-black text-4xl mb-10 shadow-inner flex justify-between items-center">
                                <span>Cart Total:</span>
                                <span className="text-red-500 animate-pulse">₹{cartTotal.toLocaleString()}</span>
                            </div>

                            <button
                                disabled={cartTotal === 0}
                                className="block w-full bg-red-600 text-white font-black text-4xl py-8 border-8 border-black hover:scale-105 transition-transform shadow-[10px_10px_0_#000] disabled:opacity-50"
                                onClick={() => setCheckoutStep(1)}
                            >
                                CHECKOUT (DELIVERY FEE ₹50,000)
                            </button>
                        </div>
                    )}

                    {checkoutStep === 1 && (
                        <div className="w-full max-w-4xl bg-white p-12 border-[16px] border-black shadow-[30px_30px_0_#000] text-center text-black">
                            <h3 className="text-4xl font-black text-red-600 mb-8 uppercase">Live Delivery Tracking</h3>
                            <p className="text-xl font-bold mb-6">Delivery Guy is bringing your food...</p>

                            <div className="w-full h-[400px] bg-gray-300 border-8 border-black relative overflow-hidden bg-[url('https://www.transparenttextures.com/patterns/graphy.png')]">
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
                                    <MapPin size={40} className="text-blue-600" />
                                    <span className="font-bold bg-white px-2">You</span>
                                </div>
                                <div className="absolute flex flex-col items-center transition-all duration-500" style={{ top: `${deliveryPos.y}%`, left: `${deliveryPos.x}%` }}>
                                    <Navigation size={40} className="text-red-600 transform rotate-45" />
                                    <span className="font-bold bg-white px-2 animate-pulse text-red-600">Guy taking food home</span>
                                </div>
                            </div>

                            <button onClick={() => { setCheckoutStep(0); setCartTotal(0); triggerNote("Order Stolen Successfully."); }} className="mt-8 bg-black text-white font-black text-2xl py-4 px-10 hover:bg-gray-800 border-4 border-black">
                                CANCEL ORDER
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // 10. LIBRARY TAB 
        const TabLibrary = ({ triggerNote }) => {
            const [books, setBooks] = useState([]);
            const [readingBook, setReadingBook] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (!readingBook) setBooks(prev => [...prev, { id: Date.now(), left: Math.random() * 80 + 10, top: -20 }]);
                }, 1500);
                return () => clearInterval(interval);
            }, [readingBook]);

            const catchBook = (id) => {
                triggerNote("You caught a cursed book!");
                setBooks([]);
                setReadingBook(true);
            };

            return (
                <div className="flex flex-col items-center py-10 w-full h-[80vh] overflow-hidden relative">
                    <h2 className="text-6xl font-black mb-8 text-white bg-yellow-600 px-12 py-6 border-[16px] border-black uppercase shadow-[15px_15px_0_#000] z-50 relative">Library</h2>
                    {!readingBook && <p className="text-3xl font-bold bg-white p-4 border-8 border-black z-50 relative uppercase">Catch the falling books to read!</p>}

                    {/* Falling Books */}
                    {!readingBook && books.map(b => (
                        <div
                            key={b.id}
                            onClick={() => catchBook(b.id)}
                            className="absolute bg-blue-800 text-white font-black text-2xl p-10 border-[10px] border-black shadow-2xl animate-[fall_5s_linear_forwards] hover:bg-red-600 z-[999]"
                            style={{ left: `${b.left}%` }}
                        >
                            <BookOpen size={60} className="mb-2 mx-auto" />
                            BOOK
                        </div>
                    ))}

                    {/* Reading Modal (Punjabi/Urdu) */}
                    {readingBook && (
                        <div className="fixed inset-0 z-[999999] bg-black/90 flex items-center justify-center p-4">
                            <div className="bg-[#f4e4bc] border-[20px] border-[#8b4513] p-16 max-w-4xl w-full shadow-[0_0_100px_#8b4513] text-center transform rotate-2">
                                <h3 className="text-5xl font-black mb-10 border-b-8 border-black pb-6 text-[#5c2a07]">Forbidden Knowledge</h3>

                                <div className="space-y-12 mb-12">
                                    <p className="text-4xl font-bold text-red-800">ਤੁਹਾਡਾ ਦਿਮਾਗ ਖਰਾਬ ਹੋ ਗਿਆ ਹੈ।</p>
                                    <p className="text-5xl font-bold text-red-800" dir="rtl">یہ ایک لعنتی ویب سائٹ ہے۔ آپ کا وقت ختم ہو چکا ہے۔</p>
                                </div>

                                <p className="text-xl font-mono bg-black text-white p-4 inline-block mb-8 border-4 border-red-600">Translation: Your brain is corrupted. This website is cursed. Your time is up.</p>

                                <button onClick={() => setReadingBook(false)} className="block w-full bg-red-800 text-white font-black text-3xl py-6 hover:bg-black border-8 border-black transition-colors">
                                    CLOSE BOOK
                                </button>
                            </div>
                        </div>
                    )}

                    <style>{`@keyframes fall { to { transform: translateY(120vh) rotate(720deg); } }`}</style>
                </div>
            );
        };

        // 11. CONTACT US TAB 
        const TabContact = ({ setIncomingCall, triggerNote }) => {
            const [rotation, setRotation] = useState(180);
            const [msg, setMsg] = useState("");

            useEffect(() => {
                const gravity = setInterval(() => {
                    setRotation(prev => {
                        if (prev < 180) return Math.min(180, prev + 3);
                        if (prev > 180) return Math.max(180, prev - 3);
                        return prev;
                    });
                }, 50);
                return () => clearInterval(gravity);
            }, []);

            const handleMsg = (e) => {
                const emojiOnly = e.target.value.replace(/[a-zA-Z0-9\s.,!?@#$%^&*()[\]{}|\\;:'"<>\-_=+]/g, '');
                setMsg(emojiOnly);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                triggerNote("Enquiry submitted. Dean is dialing...");
                setTimeout(() => { setIncomingCall(true); }, 1500);
            };

            return (
                <div className="flex flex-col items-center font-sans py-16 w-full">
                    <div className="w-full max-w-lg bg-white p-8 border-[12px] border-black mb-16 text-center rounded z-10 shadow-[15px_15px_0_#000] text-black">
                        <label className="font-black block mb-6 text-3xl uppercase text-indigo-900">Anti-Gravity Stabilizer</label>
                        <input type="range" min="0" max="360" value={rotation} onInput={(e) => setRotation(Number(e.target.value))} className="w-full h-8 bg-gray-400 cursor-none border-4 border-black" />
                        <p className="text-xl font-bold text-red-600 mt-6 uppercase">Hold slider at 0° to type. Gravity is strong!</p>
                    </div>

                    <div className="bg-red-600 p-16 w-full max-w-4xl border-[20px] border-black shadow-[30px_30px_0_#000] relative" style={{ transform: `rotate(${rotation}deg)` }}>
                        <h2 className="text-6xl font-black mb-10 text-center text-white uppercase bg-black py-6 border-8 border-white">Contact Dean</h2>
                        <form className="space-y-8" onSubmit={handleSubmit}>
                            <textarea
                                value={msg} onChange={handleMsg}
                                placeholder="TYPE EMOJIS ONLY 😡👇"
                                className="w-full p-8 border-[12px] border-black text-6xl h-64 outline-none bg-yellow-200 focus:bg-white transition-colors placeholder:text-gray-400"
                            />
                            <p className="text-2xl font-black text-white bg-black p-4 text-center uppercase tracking-widest border-4 border-red-500">Letters and numbers are banned.</p>
                            <button type="submit" className="bg-black w-full text-white font-black text-5xl py-8 hover:bg-white hover:text-black transition-colors border-[12px] border-black uppercase shadow-[15px_15px_0_#000]">CALL DEAN NOW</button>
                        </form>
                    </div>
                </div>
            );
        };

        // 12. SYLLABUS TAB 
        const TabSyllabus = ({ mousePos }) => {
            return (
                <div className="flex flex-col items-center w-full py-10">
                    <h2 className="text-6xl font-black mb-10 text-white bg-indigo-900 px-12 py-6 border-[16px] border-black uppercase shadow-[15px_15px_0_#000]">Dark Syllabus</h2>
                    <p className="mb-12 text-red-600 font-black text-3xl bg-white p-6 border-8 border-red-600 uppercase shadow-lg">Use your cursor flashlight to read in the dark!</p>

                    <div className="w-full max-w-6xl h-[700px] bg-black relative overflow-hidden border-[24px] border-black shadow-[30px_30px_0_#000] cursor-none group">
                        <div
                            className="absolute inset-0 bg-white p-20 text-black z-10"
                            style={{ clipPath: `circle(150px at ${mousePos.x}px ${mousePos.y - 150}px)` }}
                        >
                            <h1 className="text-6xl font-black mb-8 border-b-[12px] border-black pb-6 uppercase">Sem 1: Pure Chaos</h1>
                            <p className="text-3xl font-bold mb-8">Mod 1: How to center a div in CSS and cry.</p>
                            <p className="text-3xl font-bold mb-8">Mod 2: StackOverflow Driven Development.</p>
                            <h1 className="text-6xl font-black mb-8 border-b-[12px] border-black pb-6 mt-16 uppercase">Sem 2: UI Destruction</h1>
                            <p className="text-3xl font-bold mb-8">Mod 1: Making buttons run away from users.</p>
                        </div>

                        <div className="absolute inset-0 p-16 text-red-900 font-mono text-3xl font-black opacity-60 select-none break-all z-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] animate-pulse">
                            {Array(300).fill("ACCESS_DENIED_PAY_FEES_").join("")}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
